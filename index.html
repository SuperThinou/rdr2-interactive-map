<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>RDR2 Interactive Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" defer="defer" crossorigin=""></script><script defer="defer" src="main.js"></script></head><body><div id="map"><div class="map-overlay hidden"></div></div><button class="hamburger-btn">☰ Menu</button><div class="menu hidden"><button class="close-menu-btn">☰ Menu</button><h2>Paramètres</h2><button class="save-manager-btn">Gérer mes sauvegardes</button><h2 class="filters-title">Filtres</h2><button type="button" class="check-all-btn">Tout cocher</button> <button type="button" class="uncheck-all-btn">Tout décocher</button><div class="filters-container"></div><div class="progression-container"><h2>Progression</h2><p class="progression-text"></p><div class="progress-bar-container"><div class="progress-bar"></div></div></div></div><div class="save-manager-popup hidden"><button class="close-popup-btn">⨉</button><div class="save-manager-text-container"><h3>Comment ça marche ?</h3><p>C'est simple ! Le premier bouton permet de télécharger ta sauvegarde en cours, pour que tu sois sûr de ne jamais la perdre. Le deuxième bouton permet de charger une sauvegarde que tu as téléchargée</p></div><div class="save-manager-btn-container"><button class="save-download-btn">Télécharger ma sauvegarde</button> <input type="file" id="importInput" accept=".json" hidden/> <button class="save-import-btn">Importer une sauvegarde</button></div></div></body></html>
