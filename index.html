<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>RDR2 Interactive Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" defer="defer" crossorigin=""></script><script defer="defer" src="main.js"></script></head><body><div id="map"><div class="map-overlay hidden"></div></div><button class="hamburger-btn">☰ Menu</button><div class="menu hidden"><button class="close-menu-btn">☰ Menu</button><h2>Paramètres</h2><button class="save-manager-btn">Gérer mes sauvegardes</button><h2 class="filters-title">Filtres</h2><button type="button" class="check-all-btn">Tout cocher</button> <button type="button" class="uncheck-all-btn">Tout décocher</button> <label><input type="checkbox" value="card" checked="checked">Cartes de cigarettes</label> <label><input type="checkbox" value="bone" checked="checked">Os de dinosaure</label> <label><input type="checkbox" value="dreamcatcher" checked="checked">Attrape-rêves</label> <label><input type="checkbox" value="easter" checked="checked">Easter eggs</label> <label><input type="checkbox" value="hideout" checked="checked">Hideout</label> <label><input type="checkbox" value="item" checked="checked">Item</label> <label><input type="checkbox" value="request" checked="checked">Item request</label> <label><input type="checkbox" value="landmark" checked="checked">Landmark</label> <label><input type="checkbox" value="fish" checked="checked">Poissons légendaires</label> <label><input type="checkbox" value="loot" checked="checked">Loot</label> <label><input type="checkbox" value="misc" checked="checked">Misc</label> <label><input type="checkbox" value="interest" checked="checked">Points d'intérêts</label> <label><input type="checkbox" value="roberry" checked="checked">Braquages</label> <label><input type="checkbox" value="carving" checked="checked">Sculptures rocheuses</label> <label><input type="checkbox" value="shack" checked="checked">Shack</label> <label><input type="checkbox" value="stranger" checked="checked">Stranger</label> <label><input type="checkbox" value="treasure" checked="checked">Trésors</label> <label><input type="checkbox" value="weapon" checked="checked">Armes</label></div><div class="save-manager-popup hidden"><div class="save-manager-text-container"><button class="close-popup-btn">⨉</button><h3>Comment ça marche ?</h3><p>C'est simple ! Le premier bouton permet de télécharger ta sauvegarde en cours, pour que tu sois sûr de ne jamais la perdre. Le deuxième bouton permet de charger une sauvegarde que tu as téléchargée</p></div><div class="save-manager-btn-container"><button class="save-download-btn">Télécharger ma sauvegarde</button> <input type="file" id="importInput" accept=".json" hidden/> <button class="save-import-btn">Importer une sauvegarde</button></div></div></body></html>
